services:
  - type: web
    name: emotion-fl-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn fl_server:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1 --threads 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
    plan: free
    autoDeploy: true
    repo: https://github.com/SulemanAG/emotion.git
    branch: main
